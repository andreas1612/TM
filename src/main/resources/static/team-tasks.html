<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Tasks</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="app-shell">

   <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">TM</div>
            <div>
                <h2>Task Manager</h2>
                <p>Internal Tools</p>
            </div>
        </div>

        <nav class="side-nav">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/my-tasks.html">My Tasks</a>
            <a class="active" href="/team-tasks.html">Team Tasks</a>
            <a href="/create-task.html">Create Task</a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <p class="eyebrow">Direct Reports</p>
                <h1>Team Tasks</h1>
                <p id="userName" class="muted">Loading...</p>
            </div>

            <div class="header-actions">
                <button id="themeToggle" class="secondary-button" type="button" aria-label="Toggle color theme"></button>
            </div>
        </header>

        <section class="panel">

            <div class="panel-header">
                <div>
                    <h2>Team Task Groups</h2>
                    <p>Tasks grouped by team, department, and supervised exceptions</p>
                </div>
            </div>

            <div id="teamTaskGroups" class="team-task-groups"></div>

        </section>

    </main>

</div>

<script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/teamTasks.js"></script>

</body>
</html>
