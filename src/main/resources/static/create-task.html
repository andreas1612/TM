<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="app-shell">

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">TM</div>
            <div>
                <h2>Task Manager</h2>
                <p>Internal Tools</p>
            </div>
        </div>

        <nav class="side-nav">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/my-tasks.html">My Tasks</a>
            <a href="/team-tasks.html">Team Tasks</a>
            <a class="active" href="/create-task.html">Create Task</a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <p class="eyebrow">New assignment</p>
                <h1>Create Task</h1>
                <p id="userName" class="muted">Loading...</p>
            </div>

            <div class="header-actions">
                <button id="themeToggle" class="secondary-button" type="button" aria-label="Toggle color theme"></button>
            </div>
        </header>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h2>Task Details</h2>
                    <p>Create and assign a new task</p>
                </div>
            </div>

            <form id="createTaskForm" class="form">

                <label for="title">Title</label>
                <input id="title" type="text" required placeholder="Enter task title">

                <label for="description">Description</label>
                <textarea id="description" placeholder="Enter task description"></textarea>

                <div class="form-group">
                    <label for="employeeDropdown">Assign To</label>

                    <div id="selectedEmployees"
                        class="selected-employees">
                    </div>

                    <select id="employeeDropdown" aria-label="Add assigned employee">
                        <option value="">
                            Add employee...
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="client">Client</label>

                    <input type="text"
                        id="client"
                        placeholder="Enter client name">
                </div>
                <label for="priority">Priority</label>
                <select id="priority">
                    <option value="LOW">Low</option>
                    <option value="MEDIUM" selected>Medium</option>
                    <option value="HIGH">High</option>
                </select>

                <label for="dueDate">Due Date</label>
                <input id="dueDate" type="date">

                <div class="form-actions">
                    <button type="submit" class="primary-button">Create Task</button>
                    <a href="/dashboard.html" class="secondary-button">Cancel</a>
                </div>

                <div id="message" style="margin-top: 16px;"></div>

            </form>
        </section>

    </main>

</div>

<script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/createTask.js"></script>

</body>
</html>
